[build]
builder = "DOCKERFILE"

[[services]]
name = "backend"
source = "backend"

[services.build]
dockerfilePath = "Dockerfile"

[services.deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port 8000"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "frontend"
source = "frontend"

[services.build]
dockerfilePath = "Dockerfile"
